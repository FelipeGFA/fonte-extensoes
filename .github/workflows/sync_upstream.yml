name: Sync Upstream

on:
  workflow_dispatch:

permissions: {}

jobs:
  sync-branch:
    name: Sync branch with upstream
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout sync branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: sync
          fetch-depth: 0
          token: ${{ secrets.BOT_PAT }}
          persist-credentials: true

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/keiyoushi/extensions-source.git || true
          git fetch upstream main

      - name: Reset sync to upstream/main
        run: |
          git reset --hard upstream/main
          git push origin sync --force

  merge-main:
    name: Merge upstream into main
    needs: sync-branch
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout main branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.BOT_PAT }}
          persist-credentials: true

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch sync branch
        run: git fetch origin sync

      - name: Check for changes
        id: check
        run: |
          if git merge-base --is-ancestor origin/sync HEAD; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No upstream changes to sync"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected, applying upstream tree"
          fi

      - name: Apply upstream tree (preserving .github)
        if: steps.check.outputs.has_changes == 'true'
        run: |
          set -eu

          preserve_paths="$(mktemp)"
          if git cat-file -e HEAD:.github 2>/dev/null; then
            printf '.github\0' >> "$preserve_paths"
          fi

          git ls-tree -rz -r --name-only HEAD -- src |
            while IFS= read -r -d '' path; do
              case "$path" in
                src/*/*/*)
                  extension_path="${path#src/}"
                  language="${extension_path%%/*}"
                  source_path="${extension_path#*/}"
                  source="${source_path%%/*}"
                  printf 'src/%s/%s\0' "$language" "$source"
                  ;;
              esac
            done |
            sort -zu |
            while IFS= read -r -d '' path; do
              if ! git cat-file -e "origin/sync:$path" 2>/dev/null; then
                printf '%s\0' "$path"
              fi
            done >> "$preserve_paths"

          git merge --no-ff --no-commit -s ours origin/sync
          git read-tree --reset -u origin/sync

          if [ -s "$preserve_paths" ]; then
            git restore --source=HEAD --staged --worktree \
              --pathspec-from-file="$preserve_paths" \
              --pathspec-file-nul
          fi

          if ! git diff --cached --quiet || test -f .git/MERGE_HEAD; then
            git commit -m "Sync upstream"
          fi

          echo "Synced"

      - name: Push changes
        if: steps.check.outputs.has_changes == 'true'
        run: git push origin main
