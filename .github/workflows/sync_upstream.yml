name: Sync Upstream

on:
  workflow_dispatch:

permissions: {}

jobs:
  sync-branch:
    name: Sync branch with upstream
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout sync branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: sync
          fetch-depth: 0
          token: ${{ secrets.BOT_PAT }}
          persist-credentials: true

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/keiyoushi/extensions-source.git || true
          git fetch upstream main

      - name: Reset sync to upstream/main
        run: |
          git reset --hard upstream/main
          git push origin sync --force

  merge-main:
    name: Merge upstream into main
    needs: sync-branch
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout main branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.BOT_PAT }}
          persist-credentials: true

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch sync branch
        run: git fetch origin sync

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet HEAD origin/sync -- ':!.github'; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes to sync (excluding .github)"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected, applying upstream tree"
          fi

      - name: Apply upstream tree (preserving .github)
        if: steps.check.outputs.has_changes == 'true'
        run: |
          set -eu

          git merge --no-ff --no-commit -s ours origin/sync
          git read-tree --reset -u origin/sync
          git restore --source=HEAD --staged --worktree .github

          if ! git diff --cached --quiet || test -f .git/MERGE_HEAD; then
            git commit \
              -m "Sync upstream" \
          Confidence: high
          Scope-risk: broad
          Directive: Preserve origin/sync for every non-.github path, including conflicts and fork-side edits
          Tested: Tree replacement completed in workflow run
          Not-tested: Live GitHub Actions run"
          fi

          echo "Sync completed. Upstream tree applied and local .github folder preserved."

      - name: Push changes
        if: steps.check.outputs.has_changes == 'true'
        run: git push origin main
